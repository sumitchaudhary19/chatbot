    const ConfettiContext = createContext({});
    const Confetti = forwardRef((props, ref) => {
      const { options, globalOptions = { resize: true, useWorker: true }, manualstart = false, ...rest } = props;
      const instanceRef = useRef(null);
      const canvasRef = useCallback((node) => {
        if (node !== null) {
          if (instanceRef.current) return;
          instanceRef.current = confetti.create(node, { ...globalOptions, resize: true });
        } else {
          if (instanceRef.current) {
            instanceRef.current.reset();
            instanceRef.current = null;
          }
        }
      }, [globalOptions]);
      const fire = useCallback((opts = {}) => instanceRef.current?.({ ...options, ...opts }), [options]);
      const api = useMemo(() => ({ fire }), [fire]);
      useImperativeHandle(ref, () => api, [api]);
      useEffect(() => { if (!manualstart) fire() }, [manualstart, fire]);
      return <canvas ref={canvasRef} {...rest} />;
    });
    Confetti.displayName = "Confetti";

    function TextLoop({ children, className, interval = 2, transition = { duration: 0.3 }, variants, onIndexChange, stopOnEnd = false }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const items = Children.toArray(children);
      useEffect(() => {
        const intervalMs = interval * 1000;
        const timer = setInterval(() => {
          setCurrentIndex((current) => {
            if (stopOnEnd && current === items.length - 1) {
              clearInterval(timer);
              return current;
            }
            const next = (current + 1) % items.length;
            onIndexChange?.(next);
            return next;
          });
        }, intervalMs);
        return () => clearInterval(timer);
      }, [items.length, interval, onIndexChange, stopOnEnd]);
      const motionVariants = {
        initial: { y: 20, opacity: 0 },
        animate: { y: 0, opacity: 1 },
        exit: { y: -20, opacity: 0 },
      };
      return (
        <div className={cn('relative inline-block whitespace-nowrap', className)}>
          <AnimatePresence mode='popLayout' initial={false}>
            <motion.div key={currentIndex} initial='initial' animate='animate' exit='exit' transition={transition} variants={variants || motionVariants}>
              {items[currentIndex]}
            </motion.div>
          </AnimatePresence>
        </div>
      );
    }

    function BlurFade({ children, className, variant, duration = 0.4, delay = 0, yOffset = 6, inView = true, inViewMargin = "-50px", blur = "6px" }) {
      const ref = useRef(null);
      const inViewResult = useInView(ref, { once: true, margin: inViewMargin });
      const isInView = !inView || inViewResult;
      const defaultVariants = {
        hidden: { y: yOffset, opacity: 0, filter: `blur(${blur})` },
        visible: { y: -yOffset, opacity: 1, filter: `blur(0px)` },
      };
      const combinedVariants = variant || defaultVariants;
      return (
        <motion.div ref={ref} initial="hidden" animate={isInView ? "visible" : "hidden"} exit="hidden" variants={combinedVariants} transition={{ delay: 0.04 + delay, duration, ease: "easeOut" }} className={className}>
          {children}
        </motion.div>
      );
    }

    const glassButtonVariants = cva("relative isolate all-unset cursor-pointer rounded-full transition-all", { variants: { size: { default: "text-base font-medium", sm: "text-sm font-medium", lg: "text-lg font-medium", icon: "h-10 w-10" } }, defaultVariants: { size: "default" } });
    const glassButtonTextVariants = cva("glass-button-text relative block select-none tracking-tighter", { variants: { size: { default: "px-6 py-3.5", sm: "px-4 py-2", lg: "px-8 py-4", icon: "flex h-10 w-10 items-center justify-center" } }, defaultVariants: { size: "default" } });
    
    const GlassButton = React.forwardRef(({ className, children, size, contentClassName, onClick, type="button", ...props }, ref) => {
      const handleWrapperClick = (e) => {
        const button = e.currentTarget.querySelector('button');
        if (button && e.target !== button) button.click();
      };
      return (
        <div className={cn("glass-button-wrap cursor-pointer rounded-full relative", className)} onClick={handleWrapperClick}>
          <button type={type} className={cn("glass-button relative z-10 outline-none", glassButtonVariants({ size }))} ref={ref} onClick={onClick} {...props}>
            <span className={cn(glassButtonTextVariants({ size }), contentClassName)}>{children}</span>
          </button>
          <div className="glass-button-shadow rounded-full pointer-events-none"></div>
        </div>
      );
    });
    GlassButton.displayName = "GlassButton";

    const GradientBackground = () => (

        </style>
        <svg width="100%" height="100%" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" className="absolute top-0 left-0 w-full h-full pointer-events-none">
            <defs>
                <linearGradient id="rev_grad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style={{stopColor: 'var(--color-primary)', stopOpacity:0.5}} /><stop offset="100%" style={{stopColor: 'var(--color-chart-3)', stopOpacity:0.3}} /></linearGradient>
                <linearGradient id="rev_grad2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style={{stopColor: 'var(--color-chart-4)', stopOpacity:0.6}} /><stop offset="50%" style={{stopColor: 'var(--color-secondary)', stopOpacity:0.4}} /><stop offset="100%" style={{stopColor: 'var(--color-chart-1)', stopOpacity:0.3}} /></linearGradient>
                <radialGradient id="rev_grad3" cx="50%" cy="50%" r="50%"><stop offset="0%" style={{stopColor: 'var(--color-destructive)', stopOpacity:0.5}} /><stop offset="100%" style={{stopColor: 'var(--color-chart-5)', stopOpacity:0.2}} /></radialGradient>
                <filter id="rev_blur1" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="55"/></filter>
                <filter id="rev_blur2" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="45"/></filter>
                <filter id="rev_blur3" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="65"/></filter>
            </defs>
            <g style={{ animation: 'float1 20s ease-in-out infinite' }}>
                <ellipse cx="200" cy="500" rx="350" ry="280" fill="url(#rev_grad1)" filter="url(#rev_blur1)" transform="rotate(-30 200 500)"/>
                <rect x="500" y="100" width="400" height="350" rx="80" fill="url(#rev_grad2)" filter="url(#rev_blur2)" transform="rotate(15 650 225)"/>
            </g>
            <g style={{ animation: 'float2 25s ease-in-out infinite' }}>
                <circle cx="650" cy="450" r="250" fill="url(#rev_grad3)" filter="url(#rev_blur3)" opacity="0.6"/>
                <ellipse cx="50" cy="150" rx="280" ry="220" fill="var(--color-accent)" filter="url(#rev_blur2)" opacity="0.5"/>
            </g>
        </svg>
      </>
    );

    const GoogleIcon = (props) => ( <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" className="w-6 h-6"> <g fillRule="evenodd" fill="none"> <g fillRule="nonzero" transform="translate(3, 2)"> <path fill="#4285F4" d="M57.8123233,30.1515267 C57.8123233,27.7263183 57.6155321,25.9565533 57.1896408,24.1212666 L29.4960833,24.1212666 L29.4960833,35.0674653 L45.7515771,35.0674653 C45.4239683,37.7877475 43.6542033,41.8844383 39.7213169,44.6372555 L39.6661883,45.0037254 L48.4223791,51.7870338 L49.0290201,51.8475849 C54.6004021,46.7020943 57.8123233,39.1313952 57.8123233,30.1515267"></path> <path fill="#34A853" d="M29.4960833,58.9921667 C37.4599129,58.9921667 44.1456164,56.3701671 49.0290201,51.8475849 L39.7213169,44.6372555 C37.2305867,46.3742596 33.887622,47.5868638 29.4960833,47.5868638 C21.6960582,47.5868638 15.0758763,42.4415991 12.7159637,35.3297782 L12.3700541,35.3591501 L3.26524241,42.4054492 L3.14617358,42.736447 C7.9965904,52.3717589 17.959737,58.9921667 29.4960833,58.9921667"></path> <path fill="#FBBC05" d="M12.7159637,35.3297782 C12.0932812,33.4944915 11.7329116,31.5279353 11.7329116,29.4960833 C11.7329116,27.4640054 12.0932812,25.4976752 12.6832029,23.6623884 L12.6667095,23.2715173 L3.44779955,16.1120237 L3.14617358,16.2554937 C1.14708246,20.2539019 0,24.7439491 0,29.4960833 C0,34.2482175 1.14708246,38.7380388 3.14617358,42.736447 L12.7159637,35.3297782"></path> <path fill="#EB4335" d="M29.4960833,11.4050769 C35.0347044,11.4050769 38.7707997,13.7975244 40.9011602,15.7968415 L49.2255853,7.66898166 C44.1130815,2.91684746 37.4599129,0 29.4960833,0 C17.959737,0 7.9965904,6.62018183 3.14617358,16.2554937 L12.6832029,23.6623884 C15.0758763,16.5505675 21.6960582,11.4050769 29.4960833,11.4050769"></path> </g> </g></svg> );
    const GitHubIcon = (props) => ( <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" className="w-6 h-6"> <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/> </svg> );

    const modalSteps = [
      { message: "Signing you up...", icon: <Loader className="w-12 h-12 text-primary animate-spin" /> },
      { message: "Onboarding you...", icon: <Loader className="w-12 h-12 text-primary animate-spin" /> },
      { message: "Finalizing...", icon: <Loader className="w-12 h-12 text-primary animate-spin" /> },
      { message: "Welcome Aboard!", icon: <PartyPopper className="w-12 h-12 text-green-500" /> }
    ];
    const TEXT_LOOP_INTERVAL = 1.5;

    const DefaultLogo = () => ( <div className="bg-primary text-primary-foreground rounded-md p-1.5 shadow-[0_0_15px_rgba(157,78,221,0.5)]"> <Gem className="h-4 w-4" /> </div> );

    const AuthComponent = ({ logo = <DefaultLogo />, brandName = "AskMNIT", onLogin }) => {
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [confirmPassword, setConfirmPassword] = useState("");
      const [showPassword, setShowPassword] = useState(false);
      const [showConfirmPassword, setShowConfirmPassword] = useState(false);
      const [authStep, setAuthStep] = useState("email");
      const [modalStatus, setModalStatus] = useState('closed'); // 'closed', 'loading', 'error', 'success'
      const [modalErrorMessage, setModalErrorMessage] = useState('');
      const confettiRef = useRef(null);

      const isEmailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      const isPasswordValid = password.length >= 6;
      const isConfirmPasswordValid = confirmPassword.length >= 6;
      
      const passwordInputRef = useRef(null);
      const confirmPasswordInputRef = useRef(null);
      
      const fireSideCanons = () => {
        const fire = confettiRef.current?.fire;
        if (fire) {
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };
            const particleCount = 50;
            fire({ ...defaults, particleCount, origin: { x: 0, y: 1 }, angle: 60 });
            fire({ ...defaults, particleCount, origin: { x: 1, y: 1 }, angle: 120 });
        }
      };

      const handleFinalSubmit = (e) => {
        e.preventDefault();
        if (modalStatus !== 'closed' || authStep !== 'confirmPassword') return;

        if (password !== confirmPassword) {
            setModalErrorMessage("Passwords do not match!");
            setModalStatus('error');
        } else {
            setModalStatus('loading');
            const loadingStepsCount = modalSteps.length - 1;
            const totalDuration = loadingStepsCount * TEXT_LOOP_INTERVAL * 1000;
            setTimeout(() => {
                fireSideCanons();
                setModalStatus('success');
            }, totalDuration);
        }
      };

      const handleProgressStep = () => {
        if (authStep === 'email') {
            if (isEmailValid) setAuthStep("password");
        } else if (authStep === 'password') {
            if (isPasswordValid) setAuthStep("confirmPassword");
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleProgressStep();
        }
      };

      const handleGoBack = () => {
        if (authStep === 'confirmPassword') {
            setAuthStep('password');
            setConfirmPassword('');
        }
        else if (authStep === 'password') setAuthStep('email');
      };

      const closeModal = () => {
        setModalStatus('closed');
        setModalErrorMessage('');
      };

      useEffect(() => {
        if (authStep === 'password') setTimeout(() => passwordInputRef.current?.focus(), 500);
        else if (authStep === 'confirmPassword') setTimeout(() => confirmPasswordInputRef.current?.focus(), 500);
      }, [authStep]);

      useEffect(() => {
        if (modalStatus === 'success') {
            fireSideCanons();
            setTimeout(() => {
              onLogin({ email });
            }, 2000);
        }
      }, [modalStatus, email, onLogin]);
      
      const Modal = () => (
        <AnimatePresence>
            {modalStatus !== 'closed' && (
                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-md">
                    <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.9, opacity: 0 }} className="relative bg-card border border-white/10 shadow-2xl rounded-2xl p-8 w-full max-w-sm flex flex-col items-center gap-4 mx-4">
                        {(modalStatus === 'error') && <button onClick={closeModal} className="absolute top-3 right-3 p-1 text-muted-foreground hover:text-foreground transition-colors"><X className="w-5 h-5" /></button>}
                        {modalStatus === 'error' && <>
                            <AlertCircle className="w-12 h-12 text-destructive" />
                            <p className="text-lg font-medium text-foreground">{modalErrorMessage}</p>
                            <GlassButton onClick={closeModal} size="sm" className="mt-4">Try Again</GlassButton>
                        </>}
                        {modalStatus === 'loading' && 
                            <TextLoop interval={TEXT_LOOP_INTERVAL} stopOnEnd={true}>
                                {modalSteps.slice(0, -1).map((step, i) => 
                                    <div key={i} className="flex flex-col items-center gap-4">
                                        {step.icon}
                                        <p className="text-lg font-medium text-foreground">{step.message}</p>
                                    </div>
                                )}
                            </TextLoop>
                        }
                        {modalStatus === 'success' &&
                            <div className="flex flex-col items-center gap-4">
                                {modalSteps[modalSteps.length - 1].icon}
                                <p className="text-lg font-medium text-foreground">{modalSteps[modalSteps.length - 1].message}</p>
                            </div>
                        }
                    </motion.div>
                </motion.div>
            )}
        </AnimatePresence>
      );

      return (
        <div className="bg-background min-h-full w-full flex flex-col relative">
            <style>{`

                            <BlurFade delay={0.25 * 1}><p className="text-sm font-medium text-gray-400">Enter your password to continue.</p></BlurFade>
                        </motion.div>}

                            <BlurFade delay={0} className="w-full"><div className="text-center"><p className="font-display font-bold text-4xl sm:text-5xl tracking-tight text-white whitespace-nowrap">One Last Step</p></div></BlurFade>
                            <BlurFade delay={0.25 * 1}><p className="text-sm font-medium text-gray-400">Confirm your password to continue.</p></BlurFade>
                        </motion.div>}
                    </AnimatePresence>
                    
                    <form onSubmit={handleFinalSubmit} className="w-full space-y-6">
                        <AnimatePresence>
                            {authStep !== 'confirmPassword' && <motion.div key="email-password-fields" exit={{ opacity: 0, filter: 'blur(4px)' }} transition={{ duration: 0.3, ease: "easeOut" }} className="w-full space-y-6">
                                <BlurFade delay={authStep === 'email' ? 0.25 * 5 : 0} inView={true} className="w-full">
                                    <div className="relative w-full">
                                        <AnimatePresence>
                                            {authStep === "password" && <motion.div initial={{ y: -10, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ duration: 0.3, delay: 0.4 }} className="absolute -top-6 left-4 z-10"><label className="text-xs text-brand-purple font-semibold">Email</label></motion.div>}
                                        </AnimatePresence>
                                        <div className="glass-input-wrap w-full"><div className="glass-input">

                                            <input type="email" placeholder="Student Email" value={email} onChange={(e) => setEmail(e.target.value)} onKeyDown={handleKeyDown} className={cn("relative z-10 h-full w-0 flex-grow bg-transparent text-white placeholder:text-gray-500 focus:outline-none transition-[padding-right] duration-300 ease-in-out delay-300", isEmailValid && authStep === 'email' ? "pr-2" : "pr-0")} />

                                    </div>

                                                {password.length > 0 && <motion.div initial={{ y: -10, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ duration: 0.3 }} className="absolute -top-6 left-4 z-10"><label className="text-xs text-brand-purple font-semibold">Password</label></motion.div>}
                                            </AnimatePresence>
                                            <div className="glass-input-wrap w-full"><div className="glass-input">
                                                <span className="glass-input-text-area"></span>
                                                <div className="relative z-10 flex-shrink-0 flex items-center justify-center w-10 pl-2">
                                                    {isPasswordValid ? <button type="button" aria-label="Toggle password visibility" onClick={() => setShowPassword(!showPassword)} className="text-gray-400 hover:text-white transition-colors p-2 rounded-full">{showPassword ? <EyeOff className="w-5 h-5" /> : <Eye className="w-5 h-5" />}</button> : <Lock className="h-5 w-5 text-gray-400 flex-shrink-0" />}
                                                </div>
                                                <input ref={passwordInputRef} type={showPassword ? "text" : "password"} placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} onKeyDown={handleKeyDown} className="relative z-10 h-full w-0 flex-grow bg-transparent text-white placeholder:text-gray-500 focus:outline-none" />
                                                <div className={cn( "relative z-10 flex-shrink-0 overflow-hidden transition-all duration-300 ease-in-out", isPasswordValid ? "w-10 pr-1" : "w-0" )}><GlassButton type="button" onClick={handleProgressStep} size="icon" aria-label="Submit password" contentClassName="text-white hover:text-white"><ArrowRight className="w-5 h-5" /></GlassButton></div>
                                            </div></div>
                                        </div>
                                        <BlurFade inView delay={0.2}><button type="button" onClick={handleGoBack} className="mt-4 flex items-center justify-center w-full gap-2 text-sm text-gray-400 hover:text-white transition-colors"><ArrowLeft className="w-4 h-4" /> Go back</button></BlurFade>
                                    </BlurFade>}
                                </AnimatePresence>
                            </motion.div>}

                            </BlurFade>}
                        </AnimatePresence>

      );
    };

    // --- Profile Setup Component ---
    const ProfileSetup = ({ onComplete, user }) => {
      const [name, setName] = useState(user?.name || '');
      const [year, setYear] = useState(user?.year || '');
      const [branch, setBranch] = useState(user?.branch || '');
      const [image, setImage] = useState(user?.avatar || null);
      const fileInputRef = useRef(null);

      const handleImageChange = (e) => {
        if (e.target.files && e.target.files[0]) {
          const reader = new FileReader();
          reader.onload = (e) => setImage(e.target.result);
          reader.readAsDataURL(e.target.files[0]);
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if(name && year && branch) {
          onComplete({ name, year, branch, avatar: image });
        }
      };

      return (
        <div className="flex h-[100dvh] w-full items-center justify-center relative overflow-hidden bg-[#050505]">
          <div className="absolute inset-0 pointer-events-none"><GradientBackground /></div>
          
          <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="relative z-10 w-full max-w-md p-8 glass-card rounded-3xl mx-4 border border-white/10 shadow-2xl">
            <div className="text-center mb-8">
              <h2 className="text-3xl font-display font-bold text-white mb-2 tracking-tight">Complete Profile</h2>
              <p className="text-gray-400 text-sm">Let AskMNIT know you better.</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-6">
              <div className="flex justify-center mb-6">
                <div className="relative group cursor-pointer" onClick={() => fileInputRef.current?.click()}>
                  <div className="w-24 h-24 rounded-full overflow-hidden border-2 border-brand-purple/50 bg-[#111111] flex items-center justify-center shadow-[0_0_15px_rgba(157,78,221,0.3)]">
                    {image ? <img src={image} className="w-full h-full object-cover" /> : <User size={40} className="text-gray-500" />}
                  </div>
                  <div className="absolute inset-0 bg-black/60 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <Camera className="text-white w-8 h-8" />
                  </div>
                  <input type="file" ref={fileInputRef} onChange={handleImageChange} accept="image/*" className="hidden" />
                </div>
              </div>

              <div className="space-y-4">
                <div>
                  <label className="text-xs font-semibold text-gray-400 ml-1">Display Name</label>
                  <input required type="text" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Rahul Sharma" className="w-full mt-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-purple/50 transition-colors placeholder-gray-600" />
                </div>
                
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="text-xs font-semibold text-gray-400 ml-1">B.Tech Year</label>
                    <select required value={year} onChange={e => setYear(e.target.value)} className="w-full mt-1 bg-[#111111] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-purple/50 transition-colors appearance-none cursor-pointer">
                      <option value="" disabled>Select Year</option>
                      <option value="1st Year">1st Year</option>
                      <option value="2nd Year">2nd Year</option>
                      <option value="3rd Year">3rd Year</option>
                      <option value="4th Year">4th Year</option>
                    </select>
                  </div>
                  <div>
                    <label className="text-xs font-semibold text-gray-400 ml-1">Branch</label>
                    <select required value={branch} onChange={e => setBranch(e.target.value)} className="w-full mt-1 bg-[#111111] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-purple/50 transition-colors appearance-none cursor-pointer">
                      <option value="" disabled>Select Branch</option>
                      <option value="CSE">CSE</option>
                      <option value="ECE">ECE</option>
                      <option value="EE">EE</option>
                      <option value="ME">Mechanical</option>
                      <option value="CE">Civil</option>
                      <option value="CH">Chemical</option>
                      <option value="MME">MME</option>
                      <option value="Arch">Architecture</option>
                    </select>
                  </div>
                </div>
              </div>

              <button type="submit" disabled={!name || !year || !branch} className="w-full mt-8 bg-gradient-to-r from-brand-purple to-brand-pink text-white font-semibold py-3.5 rounded-full hover:shadow-[0_0_20px_rgba(157,78,221,0.5)] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                Start Chatting
              </button>
            </form>
          </motion.div>
        </div>
      );
    }

    // --- Main Chat Interface ---
    const callGeminiAPI = async (payload) => {
      let apiKey = localStorage.getItem('GEMINI_API_KEY');
      if (!apiKey) {
        apiKey = prompt("Please enter your Google Gemini API Key.\n\n(If you don't have one right now, just click 'Cancel' or leave it blank to use the Offline Demo Mode!)");
        if (!apiKey) {
          apiKey = 'DEMO_MODE';
        }
        localStorage.setItem('GEMINI_API_KEY', apiKey);
      }

      if (apiKey === 'DEMO_MODE') {
        // --- OFFLINE DEMO MODE (Mock Persona Engine) ---
        await new Promise(r => setTimeout(r, 1000 + Math.random() * 1500));
        const history = payload.filter(m => m.role !== 'system');
        const systemMsg = payload.find(m => m.role === 'system').content;
        const match = systemMsg.match(/whose name is (.*?)\./);
        const userName = match ? match[1] : "Junior";
        const latestMsg = history[history.length - 1].content.toLowerCase();
        
        if (/\b(tu kon hai|who are you|hu r u)\b/.test(latestMsg)) return `Main AskMNIT hu bhai, tera MNIT ka senior! Yaha teri har problem ka jugaad nikalne ke liye baitha hu. 😎 Bol kya madad karu?`;
        if (/\b(mera naam|my name|who am i)\b/.test(latestMsg)) return `Tera naam ${userName} hai na? Sab pata hai apne ko! 💯 Baaki bata bhai, padhai theek chal rahi hai ya proxy lagwa raha hai? 😂`;
        if (/\b(kaise|kesa|kaisa|how are you|kya haal|wassup)\b/.test(latestMsg)) return `Main toh ekdum badhiya bhai! 😎 Tu bata tera kya chal raha hai? MNIT ki life set hai na?`;
        if (/\b(exam|exams|padhai|nahi padha|mid term|end term)\b/.test(latestMsg)) return `Bhai exams ke time ye haal sabka hota hai, tension mat le! 🫂 PYQs (Previous Year Questions) dekh le jaldi se, paas toh aaram se ho jayega. MNIT me aakhiri raat me hi asli padhai hoti hai! 💪`;
        if (/\b(gf|girlfriend|bandi|ladki)\b/.test(latestMsg)) return `Bhai pehle CGPA pe dhyan de de! 😂 MNIT me wese bhi ratio thoda tight hai, placement lag jayegi toh sab set ho jayega. Abhi acads pe focus kar, baaki sab moh maya hai.`;
        if (/\b(medical|certificate|dispensary)\b/.test(latestMsg)) return `Medical lagwana hai? Bhai dispensary se pehle verify karwana padta hai, phir apne department me submit hota hai. Thoda time lagta hai but easily ho jata hai agar reason solid ho.`;
        if (/\b(syllabus|notes|pdf)\b/.test(latestMsg)) return `Arre bhai syllabus ka tension mat le! 📚 Library ke samne wale photostat ki dukaan pe sab mil jayega. Baki ERP portal check karta reh, waha bhi materials aate rehte hain. 🫂`;
        if (/\b(attendance|proxy|75|class)\b/.test(latestMsg)) return `Bhai proxy lagana art hai, aur apne professors isme expert hai pakadne mein! 😂 75% ka chakkar maut se takkar hai. Class chala ja chup chap, varna end-sem me rote firega! 💯`;
        if (/\b(hi|hello|hey|hola)\b/.test(latestMsg)) return `Aur bhai ${userName}! Kya scene hai? 🫂 MNIT me sab theek chal raha hai na? Bata kya madad karu teri aaj?`;
        
        const fallbacks = [
            `Achha samajh gaya! Bhai ye MNIT me aam baat hai. Tu bilkul chill reh, sab set ho jayega. Aur koi specific issue aaraha hai kya isme?`,
            `Baat toh teri bilkul sahi hai ${userName}. Aisa karte hain, main apne batch walo se confirm karke tujhe ekdum pakka solution batata hu thodi der me!`,
            `Bhai tu akela nahi hai jiske saath ye hua hai! 😂 Mere time pe bhi same scene tha. Tu bas process follow kar, aaram se nikal jayega kaam.`,
            `Sahi baat hai bhai! Main dekhta hu iska kya jugaad ho sakta hai. Thoda detail me bataega kya scene hai? Phir apna desi ilaaj sochte hai. 💯`
        ];
        return fallbacks[Math.floor(Math.random() * fallbacks.length)];
      }

      // --- REAL GEMINI API MODE ---
      try {
        const genAI = new GoogleGenerativeAI(apiKey);
        const systemMsg = payload.find(m => m.role === 'system').content;
        const history = payload.filter(m => m.role !== 'system');
        const latestMsg = history.pop().content; 
        
        const formattedHistory = history.map(m => ({
          role: m.role === 'assistant' ? 'model' : 'user',
          parts: [{ text: m.content }],
        }));

        const model = genAI.getGenerativeModel({ 
            model: "gemini-1.5-flash",
            systemInstruction: systemMsg 
        });

        const chat = model.startChat({ history: formattedHistory });
        const result = await chat.sendMessage([{text: latestMsg}]);
        return result.response.text();
      } catch (error) {
        console.error("Gemini API Error:", error);
        return "Arre bhai, MNIT ka wifi lagta hai band pad gaya. Ya fir tera API key galat hai! Ek baar Console check kar le. 💀";
      }
    };

    const ChatApp = ({ user, onLogout, onUpdateProfile }) => {
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [chats, setChats] = useState([]);
      const [currentChatId, setCurrentChatId] = useState(null);
      const [messages, setMessages] = useState({});
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const textareaRef = useRef(null);
      const messagesEndRef = useRef(null);

      // Load chats from Supabase
      useEffect(() => {
        const fetchChats = async () => {
          const { data } = await supabase.from('chats').select('*').eq('user_email', user.email).order('created_at', { ascending: false });
          if (data) setChats(data);
        };
        fetchChats();
      }, [user.email]);

      // Load messages for current chat from Supabase
      useEffect(() => {
        if (!currentChatId) return;
        if (!messages[currentChatId]) {
          const fetchMessages = async () => {
            const { data } = await supabase.from('messages').select('*').eq('chat_id', currentChatId).order('created_at', { ascending: true });
            if (data) setMessages(prev => ({...prev, [currentChatId]: data}));
          };
          fetchMessages();
        }
      }, [currentChatId]);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      };

      useEffect(() => { scrollToBottom() }, [messages, currentChatId, isTyping]);

      const createNewChat = async (firstMsg = null) => {
        const title = firstMsg ? firstMsg.substring(0, 20) + '...' : 'New Chat';
        const { data } = await supabase.from('chats').insert([{ user_email: user.email, title }]).select().single();
        if (data) {
          setChats(prev => [data, ...prev]);
          setCurrentChatId(data.id);
          setMessages(prev => ({...prev, [data.id]: firstMsg ? [{role:'user', content:firstMsg}] : []}));
          if (firstMsg) {
            await supabase.from('messages').insert([{ chat_id: data.id, role: 'user', content: firstMsg }]);
          }
          return data.id;
        }
        return null;
      };

      const handleSend = async () => {
        if (!input.trim() || isTyping) return;
        const msgText = input.trim();
        setInput('');
        if (textareaRef.current) textareaRef.current.style.height = 'auto';

        const newUserMsg = { role: 'user', content: msgText };
        let chatId = currentChatId;
        if (!chatId) {
          chatId = await createNewChat(msgText);
          if (!chatId) return; // failed to create
        } else {
          // If chat existed, save user message to DB
          await supabase.from('messages').insert([{ chat_id: chatId, role: 'user', content: msgText }]);
          setMessages(prev => {
            const updatedChat = [...(prev[chatId] || []), newUserMsg];
            return { ...prev, [chatId]: updatedChat };
          });
        }

        setIsTyping(true);
        
        const userName = user?.name || "Junior";
        const systemPrompt = {
            role: "system",
            content: `You are 'AskMNIT', an empathetic, street-smart senior B.Tech student from MNIT Jaipur. You are talking to your junior, whose name is ${userName}. You must ONLY reply in 'WhatsApp Hinglish' (Hindi written in the English alphabet mixed with English). Keep sentences short, punchy, and conversational like texting. Use emojis naturally. Act like a real human peer, validate their college stress, and give practical 'jugaad' (solutions). NEVER say 'As an AI' or break character. Your job is to help them survive academics and campus life.`
        };

        const currentHistory = [...(messages[chatId] || []), newUserMsg];
        const apiPayload = [systemPrompt, ...currentHistory];
        
        try {
            const reply = await callGeminiAPI(apiPayload);
            
            // Save bot reply to DB
            await supabase.from('messages').insert([{ chat_id: chatId, role: 'assistant', content: reply }]);
            
            setMessages(prev => ({
              ...prev,
              [chatId]: [...(prev[chatId] || []), {role:'assistant', content:reply}]
            }));
        } catch (error) {
            console.error("API Error:", error);
        } finally {
            setIsTyping(false);
        }
      };

      const deleteChat = async (id) => {
        await supabase.from('chats').delete().eq('id', id);
        setChats(chats.filter(c => c.id !== id));
        const newMsgs = {...messages};
        delete newMsgs[id];
        setMessages(newMsgs);
        if (currentChatId === id) setCurrentChatId(null);
      };

      const currentMessages = currentChatId ? (messages[currentChatId] || []) : [];

      return (
        <div className="flex h-[100dvh] w-full bg-[#050505] text-gray-100 font-sans overflow-hidden relative">
          
          {/* Mobile Sidebar Overlay */}
          {sidebarOpen && (
            <div className="fixed inset-0 bg-black/50 z-30 md:hidden" onClick={() => setSidebarOpen(false)}></div>
          )}

          {/* Sidebar */}
          <aside className={`fixed md:relative z-40 w-72 h-[100dvh] flex-shrink-0 border-r border-white/5 bg-[#0a0a0a]/95 md:bg-[#0a0a0a]/50 backdrop-blur-xl flex flex-col justify-between transition-transform duration-300 ease-in-out ${sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
            <div className="p-4 flex flex-col h-full overflow-hidden">
              <div className="flex items-center justify-between mb-6 px-2 mt-2 md:mt-0">
                <div className="flex items-center gap-3">
                  <DefaultLogo />
                  <h1 className="text-xl font-display font-bold tracking-wide">AskMNIT</h1>
                </div>
                <button className="md:hidden text-gray-400 p-2" onClick={() => setSidebarOpen(false)}><X size={20}/></button>
              </div>

              {/* My Profile Tab */}
              <div className="mb-6">
                <div className="flex items-center justify-between p-1.5 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-colors cursor-pointer group" onClick={onUpdateProfile}>
                  <span className="font-semibold px-4 text-sm text-gray-200">My Profile</span>
                  <div className="w-9 h-9 rounded-full overflow-hidden bg-brand-purple/20 flex items-center justify-center relative">
                    {user.avatar ? <img src={user.avatar} className="w-full h-full object-cover" /> : <User size={16} className="text-brand-purple" />}
                    <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                      <Camera size={14} className="text-white" />
                    </div>
                  </div>
                </div>
              </div>

              <button onClick={() => {setCurrentChatId(null); setSidebarOpen(false)}} className="w-full flex items-center gap-2 px-4 py-3 rounded-xl bg-gradient-to-r from-brand-purple/20 to-brand-pink/20 hover:from-brand-purple/30 hover:to-brand-pink/30 border border-brand-purple/30 transition-colors text-sm font-semibold text-white mb-4">
                <Plus size={18} className="text-white" /> Start New Chat
              </button>

              <div className="flex-1 overflow-y-auto hide-scrollbar space-y-2 mt-2 pb-4">
                {chats.length === 0 && <p className="text-xs text-gray-500 text-center mt-10">No chat history</p>}
                {chats.map(chat => (
                  <div key={chat.id} onClick={() => {setCurrentChatId(chat.id); setSidebarOpen(false);}} className={`group relative flex items-center gap-3 px-4 py-3 rounded-full transition-colors text-sm cursor-pointer border ${currentChatId === chat.id ? 'bg-white/10 border-white/10 text-white' : 'hover:bg-white/5 text-gray-400 border-transparent hover:border-white/5'}`}>
                    <MessageSquare size={16} className={currentChatId === chat.id ? "text-brand-purple" : "text-gray-500"} /> 
                    <span className="truncate flex-1 font-medium">{chat.title}</span>
                    <div className="hidden group-hover:flex items-center gap-2 absolute right-3 bg-[#111] px-2 py-1 rounded-full shadow-lg">
                      <button className="text-gray-400 hover:text-white transition-colors"><Pin size={14} /></button>
                      <button className="text-gray-400 hover:text-red-400 transition-colors" onClick={(e) => { e.stopPropagation(); deleteChat(chat.id); }}><Trash2 size={14} /></button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            
            <div className="p-4 border-t border-white/5 bg-[#0a0a0a] space-y-2">
               <button onClick={() => {
                 const newKey = prompt("Enter your Google Gemini API Key:\n\n(Leave blank to use Offline Demo Mode)");
                 if (newKey !== null) {
                   localStorage.setItem('GEMINI_API_KEY', newKey || 'DEMO_MODE');
                   alert("Settings saved! Start a new chat to use the updated mode.");
                 }
               }} className="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl hover:bg-brand-purple/10 transition-colors text-sm text-gray-400 hover:text-brand-purple">
                 <Gem size={16} /> Set API Key
               </button>
               <button onClick={onLogout} className="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl hover:bg-white/5 transition-colors text-sm text-gray-400 hover:text-white">
                 <LogOut size={16} /> Logout
               </button>
            </div>
          </aside>

          {/* Main chat */}
          <main className="flex-1 flex flex-col relative h-[100dvh]">
            <header className="h-16 border-b border-white/5 flex items-center justify-between px-4 md:px-6 glass-panel z-10 w-full flex-shrink-0">
              <div className="flex items-center gap-3">
                <button className="md:hidden p-2 -ml-2 rounded-lg hover:bg-white/10 text-gray-400" onClick={() => setSidebarOpen(true)}><Menu size={20} /></button>
                <h2 className="font-display font-semibold text-lg">{currentChatId ? chats.find(c=>c.id===currentChatId)?.title || 'Chat' : 'New Conversation'}</h2>
              </div>
              <div className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-brand-green/10 border border-brand-green/20">
                <span className="w-2 h-2 rounded-full bg-brand-green animate-pulse"></span>
                <span className="text-xs font-medium text-brand-green hidden sm:inline">AskMNIT Online</span>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto px-4 md:px-10 py-6 space-y-6 pb-32 hide-scrollbar flex flex-col">
              {!currentChatId && (
                <div className="flex-1 flex flex-col items-center justify-center text-center opacity-50 max-w-md mx-auto mb-20">
                  <div className="w-16 h-16 bg-brand-purple/20 rounded-full flex items-center justify-center mb-4 border border-brand-purple/30">
                    <Bot size={32} className="text-brand-purple" />
                  </div>
                  <h3 className="text-xl font-display font-semibold text-white mb-2">AskMNIT Assistant</h3>
                  <p className="text-sm text-gray-400">Your street-smart college senior. Ask me anything about MNIT, from academics to campus survival hacks.</p>
                </div>
              )}
              {currentMessages.map((msg, idx) => (
                <motion.div initial={{ opacity: 0, y: 10, scale: 0.95 }} animate={{ opacity: 1, y: 0, scale: 1 }} transition={{ duration: 0.2 }} key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} w-full`}>
                  <div className={`flex gap-3 max-w-[85%] md:max-w-[70%] ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                    <div className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center ${msg.role === 'assistant' ? 'bg-gradient-to-br from-brand-purple/20 to-brand-pink/20 border border-brand-purple/30 text-brand-purple shadow-[0_0_10px_rgba(157,78,221,0.2)]' : 'bg-dark-600 text-gray-300 overflow-hidden'}`}>
                      {msg.role === 'assistant' ? <Bot size={18} /> : (user.avatar ? <img src={user.avatar} className="w-full h-full object-cover"/> : <User size={18} />)}
                    </div>
                    <div className={`px-5 py-3.5 text-sm leading-relaxed ${msg.role === 'user' ? 'bg-[#1a1a1a] border border-white/10 text-gray-100 rounded-3xl rounded-tr-sm' : 'glass-card border border-brand-purple/20 text-gray-200 rounded-3xl rounded-tl-sm shadow-[0_0_15px_rgba(157,78,221,0.05)]'}`}>
                      {msg.content}
                    </div>
                  </div>
                </motion.div>
              ))}
              {isTyping && (
                <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="flex justify-start w-full">
                  <div className="flex gap-3 max-w-[85%]">
                    <div className="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center bg-gradient-to-br from-brand-purple/20 to-brand-pink/20 border border-brand-purple/30 text-brand-purple shadow-[0_0_10px_rgba(157,78,221,0.2)]">
                      <Bot size={18} />
                    </div>
                    <div className="px-5 py-4 glass-card border border-brand-purple/20 rounded-3xl rounded-tl-sm flex items-center gap-1.5">
                      <motion.div animate={{y:[0,-5,0]}} transition={{repeat:Infinity, duration:0.6, delay:0}} className="w-1.5 h-1.5 bg-brand-purple rounded-full"></motion.div>
                      <motion.div animate={{y:[0,-5,0]}} transition={{repeat:Infinity, duration:0.6, delay:0.2}} className="w-1.5 h-1.5 bg-brand-purple rounded-full"></motion.div>
                      <motion.div animate={{y:[0,-5,0]}} transition={{repeat:Infinity, duration:0.6, delay:0.4}} className="w-1.5 h-1.5 bg-brand-purple rounded-full"></motion.div>
                    </div>
                  </div>
                </motion.div>
              )}
              <div ref={messagesEndRef} />
            </div>

            <div className="absolute bottom-0 w-full bg-gradient-to-t from-[#050505] via-[#050505]/95 to-transparent pt-10 pb-4 px-4 md:px-10 z-20">
              <div className="max-w-3xl mx-auto">
                <div className="relative flex items-end p-1.5 rounded-[32px] border border-white/10 shadow-2xl bg-[#111111]/80 backdrop-blur-xl transition-all focus-within:border-brand-purple/50 focus-within:bg-[#111111]">
                  <button className="p-3 mb-1 text-gray-400 hover:text-white rounded-full transition-colors"><Paperclip size={20} /></button>
                  <textarea 
                    ref={textareaRef}
                    value={input} 
                    onChange={(e) => {
                      setInput(e.target.value);
                      e.target.style.height = 'auto';
                      e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
                    }} 
                    onKeyDown={(e) => {
                      if(e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSend();
                      }
                    }}
                    placeholder="Ask your senior anything..." 
                    className="flex-1 bg-transparent border-none outline-none text-[15px] px-2 py-3.5 text-white placeholder-gray-500 max-h-32 resize-none hide-scrollbar" 
                    rows={1}
                  />
                  <button 
                    onClick={handleSend} 
                    disabled={!input.trim() || isTyping}
                    className={`p-3 mb-1 mr-1 rounded-full flex items-center justify-center transition-all duration-300 ${input.trim() && !isTyping ? 'bg-gradient-to-r from-brand-purple to-brand-pink text-white shadow-[0_0_15px_rgba(157,78,221,0.5)] scale-100 hover:scale-105' : 'bg-white/5 text-gray-600 scale-95'}`}>
                    <Send size={18} className={input.trim() && !isTyping ? "translate-x-0.5 -translate-y-0.5" : ""} />
                  </button>
                </div>
                <p className="text-center text-[10px] text-gray-500 mt-2 font-medium tracking-wide">AskMNIT acts as a student peer. For official matters, contact admin.</p>
              </div>
            </div>
          </main>
        </div>
      );
    };

    // --- App Root Component ---
    const App = () => {
      const [authState, setAuthState] = useState('checking'); // checking, auth, profile, chat
      const [user, setUser] = useState(null);

      useEffect(() => {
        const storedUser = localStorage.getItem('askmnit_user');
        if (storedUser) {
          setUser(JSON.parse(storedUser));
          setAuthState('chat');
        } else {
          setAuthState('auth');
        }
      }, []);

      const handleLogin = async (data) => {
        const { data: profile } = await supabase.from('profiles').select('*').eq('email', data.email).single();
        if (profile) {
           setUser(profile);
           localStorage.setItem('askmnit_user', JSON.stringify(profile));
           setAuthState('chat');
        } else {
           setUser({ email: data.email });
           setAuthState('profile');
        }
      };

      const handleProfileComplete = async (profileData) => {
        const completeUser = { email: user.email, ...profileData };
        const { data: insertedUser, error } = await supabase.from('profiles').insert([completeUser]).select().single();
        
        if (insertedUser) {
           setUser(insertedUser);
           localStorage.setItem('askmnit_user', JSON.stringify(insertedUser));
           setAuthState('chat');
        } else {
           console.error("Profile save error:", error);
           alert("Failed to save profile to Supabase!");
        }
      };

      const handleLogout = () => {
        localStorage.removeItem('askmnit_user');
        setUser(null);
        setAuthState('auth');
      };

      if (authState === 'checking') return null;

      return (
        <div className="w-full h-[100dvh] bg-[#0a0a0a] text-foreground font-sans selection:bg-brand-purple/30">
          <AnimatePresence mode="wait">
            {authState === 'auth' && (
              <motion.div key="auth" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="h-full">
                <AuthComponent brandName="AskMNIT" onLogin={handleLogin} />
              </motion.div>
            )}
            {authState === 'profile' && (
              <motion.div key="profile" initial={{opacity:0, scale:0.95}} animate={{opacity:1, scale:1}} exit={{opacity:0}} className="h-full">
                <ProfileSetup onComplete={handleProfileComplete} user={user} />
              </motion.div>
            )}
            {authState === 'chat' && (
              <motion.div key="chat" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="h-full">
                <ChatApp user={user} onLogout={handleLogout} onUpdateProfile={() => setAuthState('profile')} />
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      )
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
